<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Pattern Manual{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='images/favicon.ico') }}?v=2" type="image/x-icon">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}?v=2" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}?v=2" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/sidebar.css') }}?v=2" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/modal.css') }}?v=2" />
  <script src="{{ url_for('static', filename='js/pdf.min.js') }}"></script>
  <script src="{{ url_for('static', filename='js/pdf.worker.min.js') }}"></script>
  {% block page_css %}{% endblock %}
</head>
<body data-base-path="{{ base_path }}" class="{% block body_class %}{% endblock %}">
  {% block content %}{% endblock %}
  {% block page_js %}{% endblock %}
</body>
</html>
