<div id="confirmModal" class="confirm-modal hidden">
  <div class="confirm-modal-backdrop" data-confirm-close="backdrop"></div>

  <div class="confirm-modal-card" role="dialog" aria-modal="true" aria-labelledby="confirmModalTitle">
    <div class="confirm-modal-header">
      <h3 id="confirmModalTitle">Xác nhận thao tác</h3>
      <button type="button" class="confirm-modal-close" id="confirmModalCloseBtn" aria-label="Đóng">
        <span>×</span>
      </button>
    </div>

    <div class="confirm-modal-body">
      <p id="confirmModalMessage">Bạn có chắc muốn thực hiện thao tác này không?</p>
    </div>

    <div class="confirm-modal-actions">
      <button type="button" class="secondary-btn" id="confirmModalCancelBtn">Hủy</button>
      <button type="button" class="danger-btn" id="confirmModalOkBtn">Xác nhận</button>
    </div>
  </div>
</div>
