<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập - Pattern Manual</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
      padding: 28px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    p {
      margin: 0 0 20px;
      color: #64748b;
    }
    .form-group {
      margin-bottom: 14px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }
    input {
      width: 100%;
      height: 44px;
      border: 1px solid #d8dee8;
      border-radius: 12px;
      padding: 0 12px;
      box-sizing: border-box;
      font-size: 15px;
    }
    button {
      width: 100%;
      height: 46px;
      border: 0;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .status {
      margin-top: 14px;
      color: #dc2626;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>Pattern Manual</h1>
    <p>Đăng nhập để sử dụng hệ thống</p>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" required />
      </div>

      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <input id="password" type="password" required />
      </div>

      <button type="submit">Đăng nhập</button>
      <div class="status" id="loginStatus"></div>
    </form>
  </div>

  <script>
    const loginForm = document.getElementById("loginForm");
    const loginStatus = document.getElementById("loginStatus");

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      loginStatus.textContent = "Đang đăng nhập...";

      try {
        const response = await fetch("/api/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, password })
        });

        const result = await response.json();

        if (!response.ok || !result.success) {
          loginStatus.textContent = result.message || "Đăng nhập thất bại";
          return;
        }

        window.location.href = "/";
      } catch (error) {
        console.error(error);
        loginStatus.textContent = "Có lỗi khi đăng nhập";
      }
    });
  </script>
</body>
</html>
